spring.application.name=users

# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://localhost:5432/app2
spring.datasource.username=dan
spring.datasource.password=dan
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.hateoas.use-hal-as-default-json-media-type=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.hateoas.HypermediaAutoConfiguration

# Optional: show SQL statements in console
spring.jpa.show-sql=true
